<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USD ↔ Colombian Peso Calculator</title>
  <!-- PWA / Home Screen -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003893" />
  <link rel="apple-touch-icon" href="MlyOQ.jpg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Nos Fuimos" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #003893 0%, #ce1126 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-wrap {
      width: 160px;
      height: 160px;
      overflow: hidden;
      border-radius: 26px;
      margin: 0 auto 10px;
    }

    .logo-wrap img {
      width: 130%;
      height: 130%;
      object-fit: contain;
      margin: -15%;
      display: block;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    h1 span { color: #003893; }

    /* ── Rate badge ── */
    .rate-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1px solid #c8d8ff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: #2c4ea0;
      margin-top: 10px;
    }

    .rate-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .rate-badge .dot.live    { background: #22c55e; }
    .rate-badge .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    .rate-badge .dot.error   { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Converter ── */
    .converter {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .currency-tag {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      font-size: 0.9rem;
      color: #888;
      pointer-events: none;
      user-select: none;
    }

    input[type="number"], input[type="text"] {
      width: 100%;
      padding: 14px 14px 14px 52px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #1a1a2e;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: textfield;
      background: #fff;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { appearance: none; }

    input[type="number"]:focus, input[type="text"]:focus {
      border-color: #003893;
    }

    input[type="number"].cop-input {
      border-color: #e0e0e0;
      background: #f7f8fc;
    }

    input[type="number"].cop-input:focus {
      border-color: #ce1126;
      background: #fff;
    }

    /* ── Swap button ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 2px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .swap-btn {
      background: #f0f4ff;
      border: 1px solid #c8d8ff;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      color: #003893;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .swap-btn:hover {
      background: #003893;
      color: #fff;
      transform: rotate(180deg);
    }

    /* ── Quick Reference ── */
    .quick-section {
      margin-top: 20px;
    }

    .quick-title {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .quick-card {
      background: #f7f8fc;
      border: 1px solid #eaedf5;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-card:hover {
      background: #eef2ff;
      border-color: #b0c0f0;
      transform: translateY(-2px);
    }

    .quick-card:active { transform: translateY(0); }

    .quick-usd {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a2e;
    }

    .quick-arrow {
      font-size: 0.65rem;
      color: #bbb;
      margin: 3px 0;
    }

    .quick-cop {
      font-size: 0.72rem;
      font-weight: 600;
      color: #003893;
      font-variant-numeric: tabular-nums;
      min-height: 1.1em;
    }

    .quick-cop.loading-text { color: #bbb; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.7rem;
      color: #bbb;
    }

    .footer a {
      color: #003893;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="logo-wrap">
        <img src="MlyOQ.jpg" alt="Nos Fuimos logo" />
      </div>
      <h1>USD ↔ <span>Colombian Peso</span></h1>
      <div class="rate-badge">
        <span class="dot loading" id="statusDot"></span>
        <span id="rateText">Fetching live rate…</span>
      </div>
    </div>

    <!-- Converter -->
    <div class="converter">

      <!-- USD -->
      <div>
        <label>US Dollars (USD)</label>
        <div class="input-wrap">
          <span class="currency-tag">$</span>
          <input
            type="number"
            id="usdInput"
            placeholder="0.00"
            min="0"
            step="any"
            inputmode="decimal"
          />
        </div>
      </div>

      <!-- Swap divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <button class="swap-btn" onclick="swapFocus()" title="Switch direction">⇅</button>
        <div class="divider-line"></div>
      </div>

      <!-- COP -->
      <div>
        <label>Colombian Pesos (COP)</label>
        <div class="input-wrap">
          <span class="currency-tag" style="font-size:0.75rem;color:#aaa;">COP</span>
          <input
            type="text"
            id="copInput"
            placeholder="0"
            inputmode="numeric"
            class="cop-input"
            style="padding-left: 58px;"
          />
        </div>
      </div>

    </div>

    <!-- Quick Reference -->
    <div class="quick-section">
      <div class="quick-title">⚡ Quick Reference</div>
      <div class="quick-grid">
        <div class="quick-card" onclick="fillUSD(20)">
          <div class="quick-usd">$20</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q20">Loading…</div>
        </div>
        <div class="quick-card" onclick="fillUSD(50)">
          <div class="quick-usd">$50</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q50">Loading…</div>
        </div>
        <div class="quick-card" onclick="fillUSD(100)">
          <div class="quick-usd">$100</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q100">Loading…</div>
        </div>
      </div>
    </div>

    <div class="footer">
      Live rate via <a href="https://www.exchangerate-api.com" target="_blank">ExchangeRate API</a>
      &nbsp;·&nbsp; Tap a card to auto-fill
    </div>

  </div>

  <script>
    let exchangeRate = null;
    let updating = false;

    const usdInput  = document.getElementById('usdInput');
    const copInput  = document.getElementById('copInput');
    const rateText  = document.getElementById('rateText');
    const statusDot = document.getElementById('statusDot');
    const q20       = document.getElementById('q20');
    const q50       = document.getElementById('q50');
    const q100      = document.getElementById('q100');

    function formatCOP(amount) {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
      }).format(amount);
    }

    // Format a raw number with commas: 4127500 → "4,127,500"
    function addCommas(num) {
      return Math.round(num).toLocaleString('en-US');
    }

    // Strip commas to get raw number: "4,127,500" → 4127500
    function stripCommas(str) {
      return parseFloat(String(str).replace(/,/g, ''));
    }

    function round(val, decimals) {
      return Math.round(val * 10 ** decimals) / 10 ** decimals;
    }

    usdInput.addEventListener('input', () => {
      if (updating) return;
      updating = true;
      const val = parseFloat(usdInput.value);
      if (usdInput.value === '' || isNaN(val)) {
        copInput.value = '';
      } else if (exchangeRate) {
        copInput.value = addCommas(val * exchangeRate);
      }
      updating = false;
    });

    copInput.addEventListener('input', () => {
      if (updating) return;
      updating = true;
      // Strip commas user may have typed or that were auto-inserted
      const raw = copInput.value.replace(/,/g, '');
      const val = parseFloat(raw);
      if (raw === '' || isNaN(val)) {
        usdInput.value = '';
      } else if (exchangeRate) {
        usdInput.value = round(val / exchangeRate, 2);
      }
      updating = false;
    });

    // Format COP with commas when user leaves the field
    copInput.addEventListener('blur', () => {
      const raw = stripCommas(copInput.value);
      if (!isNaN(raw) && copInput.value !== '') {
        copInput.value = addCommas(raw);
      }
    });

    // Strip commas when user focuses so typing works naturally
    copInput.addEventListener('focus', () => {
      const raw = stripCommas(copInput.value);
      if (!isNaN(raw) && copInput.value !== '') {
        copInput.value = Math.round(raw);
      }
    });

    function fillUSD(amount) {
      usdInput.value = amount;
      if (exchangeRate) copInput.value = addCommas(amount * exchangeRate);
      usdInput.focus();
    }

    function swapFocus() {
      if (document.activeElement === usdInput) {
        copInput.focus();
      } else {
        usdInput.focus();
      }
    }

    function updateQuickCards() {
      [{ el: q20, usd: 20 }, { el: q50, usd: 50 }, { el: q100, usd: 100 }].forEach(({ el, usd }) => {
        if (exchangeRate) {
          el.textContent = formatCOP(usd * exchangeRate);
          el.classList.remove('loading-text');
        } else {
          el.textContent = '—';
          el.classList.add('loading-text');
        }
      });
    }

    async function fetchRate() {
      statusDot.className = 'dot loading';
      rateText.textContent = 'Fetching live rate…';
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        if (data.result !== 'success') throw new Error('API error');
        exchangeRate = data.rates.COP;
        const formatted = new Intl.NumberFormat('en-US', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        }).format(exchangeRate);
        rateText.textContent = `1 USD = ${formatted} COP`;
        statusDot.className = 'dot live';
        updateQuickCards();
        if (usdInput.value) usdInput.dispatchEvent(new Event('input'));
        if (copInput.value) copInput.dispatchEvent(new Event('input'));
      } catch (err) {
        statusDot.className = 'dot error';
        rateText.textContent = 'Could not load rate — tap to retry';
        rateText.style.cursor = 'pointer';
        rateText.onclick = fetchRate;
        updateQuickCards();
      }
    }

    fetchRate();
  </script>
</body>
</html>
