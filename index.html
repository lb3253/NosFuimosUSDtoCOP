<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USD → Colombian Peso Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #003893 0%, #ce1126 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 10px;
      border-radius: 22px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    h1 span {
      color: #003893;
    }

    /* ── Rate badge ── */
    .rate-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1px solid #c8d8ff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: #2c4ea0;
      margin-top: 10px;
    }

    .rate-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .rate-badge .dot.live { background: #22c55e; }
    .rate-badge .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    .rate-badge .dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Converter ── */
    .converter {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .currency-tag {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      font-size: 0.9rem;
      color: #888;
      pointer-events: none;
      user-select: none;
    }

    input[type="number"] {
      width: 100%;
      padding: 14px 14px 14px 52px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #1a1a2e;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { appearance: none; }

    input[type="number"]:focus {
      border-color: #003893;
    }

    .result-box {
      background: linear-gradient(135deg, #003893, #1a5fd8);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-amount {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .result-amount.placeholder {
      opacity: 0.35;
      font-size: 1.1rem;
    }

    .cop-tag {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 2px 7px;
      margin-top: 2px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
      color: #ccc;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    /* ── Quick Reference ── */
    .quick-section {
      margin-top: 22px;
    }

    .quick-title {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .quick-card {
      background: #f7f8fc;
      border: 1px solid #eaedf5;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-card:hover {
      background: #eef2ff;
      border-color: #b0c0f0;
      transform: translateY(-2px);
    }

    .quick-card:active {
      transform: translateY(0);
    }

    .quick-usd {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a2e;
    }

    .quick-arrow {
      font-size: 0.65rem;
      color: #bbb;
      margin: 3px 0;
    }

    .quick-cop {
      font-size: 0.72rem;
      font-weight: 600;
      color: #003893;
      font-variant-numeric: tabular-nums;
      min-height: 1.1em;
    }

    .quick-cop.loading-text {
      color: #bbb;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.7rem;
      color: #bbb;
    }

    .footer a {
      color: #003893;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Header -->
    <div class="header">
      <img src="MlyOQ.jpg" alt="Nos Fuimos logo" class="logo" />
      <h1>USD → <span>Colombian Peso</span></h1>
      <div class="rate-badge">
        <span class="dot loading" id="statusDot"></span>
        <span id="rateText">Fetching live rate…</span>
      </div>
    </div>

    <!-- Converter -->
    <div class="converter">
      <div>
        <label>Amount in US Dollars</label>
        <div class="input-wrap">
          <span class="currency-tag">$</span>
          <input
            type="number"
            id="usdInput"
            placeholder="0.00"
            min="0"
            step="any"
            inputmode="decimal"
          />
        </div>
      </div>

      <div class="divider">equals</div>

      <div>
        <label>Colombian Pesos (COP)</label>
        <div class="result-box">
          <div>
            <div class="result-label">Result</div>
            <div class="result-amount placeholder" id="copResult">Enter an amount</div>
          </div>
          <div class="cop-tag">COP</div>
        </div>
      </div>
    </div>

    <!-- Quick Reference -->
    <div class="quick-section">
      <div class="quick-title">⚡ Quick Reference</div>
      <div class="quick-grid">
        <div class="quick-card" onclick="fillAmount(20)">
          <div class="quick-usd">$20</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q20">Loading…</div>
        </div>
        <div class="quick-card" onclick="fillAmount(50)">
          <div class="quick-usd">$50</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q50">Loading…</div>
        </div>
        <div class="quick-card" onclick="fillAmount(100)">
          <div class="quick-usd">$100</div>
          <div class="quick-arrow">↓</div>
          <div class="quick-cop loading-text" id="q100">Loading…</div>
        </div>
      </div>
    </div>

    <div class="footer">
      Rate via <a href="https://www.frankfurter.app" target="_blank">Frankfurter API</a> &nbsp;·&nbsp;
      Tap a quick-reference card to auto-fill
    </div>

  </div>

  <script>
    let exchangeRate = null;

    const usdInput   = document.getElementById('usdInput');
    const copResult  = document.getElementById('copResult');
    const rateText   = document.getElementById('rateText');
    const statusDot  = document.getElementById('statusDot');
    const q20        = document.getElementById('q20');
    const q50        = document.getElementById('q50');
    const q100       = document.getElementById('q100');

    // Format number as Colombian Peso with periods as thousands separator
    function formatCOP(amount) {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
      }).format(amount);
    }

    function convert(usd) {
      if (!exchangeRate || isNaN(usd) || usd === '') return null;
      return usd * exchangeRate;
    }

    function updateResult() {
      const val = parseFloat(usdInput.value);
      if (usdInput.value === '' || isNaN(val) || val < 0) {
        copResult.textContent = 'Enter an amount';
        copResult.classList.add('placeholder');
        return;
      }
      if (!exchangeRate) {
        copResult.textContent = 'Rate unavailable';
        copResult.classList.add('placeholder');
        return;
      }
      copResult.textContent = formatCOP(val * exchangeRate);
      copResult.classList.remove('placeholder');
    }

    function fillAmount(amount) {
      usdInput.value = amount;
      updateResult();
      usdInput.focus();
    }

    function updateQuickCards() {
      const cards = [
        { el: q20,  usd: 20  },
        { el: q50,  usd: 50  },
        { el: q100, usd: 100 },
      ];
      cards.forEach(({ el, usd }) => {
        if (exchangeRate) {
          el.textContent = formatCOP(usd * exchangeRate);
          el.classList.remove('loading-text');
        } else {
          el.textContent = '—';
          el.classList.add('loading-text');
        }
      });
    }

    async function fetchRate() {
      statusDot.className = 'dot loading';
      rateText.textContent = 'Fetching live rate…';
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        if (data.result !== 'success') throw new Error('API error');
        exchangeRate = data.rates.COP;
        const formatted = new Intl.NumberFormat('en-US', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        }).format(exchangeRate);
        rateText.textContent = `1 USD = ${formatted} COP`;
        statusDot.className = 'dot live';
        updateQuickCards();
        updateResult();
      } catch (err) {
        statusDot.className = 'dot error';
        rateText.textContent = 'Could not load rate — retry?';
        rateText.style.cursor = 'pointer';
        rateText.onclick = fetchRate;
        updateQuickCards();
      }
    }

    usdInput.addEventListener('input', updateResult);

    fetchRate();
  </script>
</body>
</html>
